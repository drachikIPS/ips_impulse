<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImPulSe — Intro / Outro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────────────────────────────────────────────────
     ImPulSe animated intro — used both as the opening and the closing
     clip (the outro simply replays the intro identically).
     ─────────────────────────────────────────────────────────────────────
     TIMELINE (≈ 10 s)
       0.0 – 3.0   Dark pulse heartbeat (no logo)
       3.0 – 7.0   Wordmark + pulse wave draws in
       7.0 – 10.0  Hold on final logo
     ───────────────────────────────────────────────────────────────────── */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#030e1f;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    font-family:'Barlow', sans-serif;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 75% 55% at 50% 55%, rgba(26,122,191,0.26) 0%, transparent 70%),
      radial-gradient(ellipse 30% 55% at 15% 85%, rgba(45,79,163,0.12) 0%, transparent 60%);
    pointer-events:none; z-index:0;
    animation: backgroundPulse 1.7s ease-in-out infinite;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(26,122,191,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,122,191,0.035) 1px, transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }

  .logo-wrap {
    position:relative; z-index:1;
    transform:scale(1.35); transform-origin:center;
  }
  svg { display:block; overflow:visible; }

  /* Heartbeat dot */
  .lead-dot {
    position:absolute; top:50%; left:50%;
    width:8px; height:8px; border-radius:50%; background:#2390d8;
    box-shadow:0 0 28px 8px rgba(35,144,216,0.5);
    z-index:1;
    transform:translate(-50%,-50%) scale(1);
    animation: leadIn 1.2s ease-in-out infinite, leadFade 0.6s ease 3.0s forwards;
  }

  /* ── INTRO build animations ── */
  .t-ipu { opacity:0; animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 3.2s forwards; }
  .t-se  { opacity:0; animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 3.65s forwards; }
  .pulse-glow  { stroke-dasharray:340; stroke-dashoffset:340; animation: draw 2.4s cubic-bezier(0.4,0,0.2,1) 4.6s forwards; }
  .pulse-crisp { stroke-dasharray:340; stroke-dashoffset:340; animation: draw 2.4s cubic-bezier(0.4,0,0.2,1) 4.6s forwards; }
  .peak-dot  { opacity:0; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 6.9s forwards; }
  .div-left  { opacity:0; animation: fadeIn 1.0s ease 6.5s forwards; }
  .div-right { opacity:0; animation: fadeIn 1.0s ease 6.5s forwards; }
  .sub-g     { opacity:0; animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 7.0s forwards; }
  .byl-g     { opacity:0; animation: fadeIn 1.0s ease 7.5s forwards; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
  @keyframes draw   { to{stroke-dashoffset:0;} }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes popIn  { from{opacity:0;transform:scale(0);} to{opacity:1;transform:scale(1);} }

  @keyframes leadIn {
    0%   { transform:translate(-50%,-50%) scale(0.5); opacity:0.35; }
    50%  { transform:translate(-50%,-50%) scale(1.6); opacity:1.0; }
    100% { transform:translate(-50%,-50%) scale(0.5); opacity:0.35; }
  }
  @keyframes leadFade { to { opacity:0; } }
  @keyframes backgroundPulse {
    0%   { filter:brightness(0.85); }
    50%  { filter:brightness(1.3);  }
    100% { filter:brightness(0.85); }
  }

  /* Outro simply replays this intro identically — no mode-specific CSS. */
</style>
</head>
<body>
<div class="lead-dot" id="leadDot"></div>

<div class="logo-wrap">
  <svg id="logo" width="532" height="178" viewBox="0 0 532 178" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
      </filter>
    </defs>

    <text id="t-impu" class="t-ipu" x="0" y="108"
      font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="96" letter-spacing="-2">
      <tspan fill="#2390d8">I</tspan><tspan fill="#ffffff">m</tspan><tspan fill="#2390d8">P</tspan><tspan fill="#ffffff">u</tspan>
    </text>

    <text id="t-se" class="t-se" x="276" y="108"
      font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="96" letter-spacing="-2">
      <tspan fill="#2390d8">S</tspan><tspan fill="#ffffff">e</tspan>
    </text>

    <line id="div-left" class="div-left" x1="0" y1="125" x2="226" y2="125" stroke="#1c4a72" stroke-width="1"/>

    <polyline id="pulse-glow" class="pulse-glow"
      points="226,125 232,125 240,18 250,134 257,75 264,125 272,125"
      fill="none" stroke="#2390d8" stroke-width="9"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow)" opacity="0.4"/>

    <polyline id="pulse-crisp" class="pulse-crisp"
      points="226,125 232,125 240,18 250,134 257,75 264,125 272,125"
      fill="none" stroke="#2390d8" stroke-width="2.8"
      stroke-linecap="round" stroke-linejoin="round"/>

    <circle id="peak-dot" class="peak-dot" cx="240" cy="18" r="3" fill="#2390d8"/>

    <line id="div-right" class="div-right" x1="272" y1="125" x2="530" y2="125" stroke="#1c4a72" stroke-width="1"/>

    <text id="t-sub" class="sub-g" x="0" y="151"
      font-family="'Barlow',sans-serif" font-weight="400" font-size="13.5"
      letter-spacing="3.5" fill="#5a9fd4">PLAN.  ANTICIPATE.  DELIVER.  TOGETHER.</text>

    <text id="t-byl" class="byl-g" x="0" y="171"
      font-family="'Barlow',sans-serif" font-weight="600" font-size="9.5"
      letter-spacing="3" fill="#1a3f5c">BY GROUP IPS</text>
  </svg>
</div>

<script>
  /* The outro just replays the intro — no extra logic needed. */

  /* Layout refinement — identical to the in-app animation */
  function refineLayout() {
    try {
      var baseline=125, capTop=18, pulseW=46, gapBefore=4, gapAfter=4;
      var impu = document.getElementById('t-impu');
      var bb = impu.getBBox();
      if (!bb || bb.width < 50) return;
      var impuEnd = bb.x + bb.width;
      var ps = impuEnd + gapBefore;
      var seX = ps + pulseW + gapAfter;
      document.getElementById('t-se').setAttribute('x', seX);
      var pts = [
        ps+','+baseline,(ps+6)+','+baseline,(ps+14)+','+capTop,
        (ps+24)+','+(baseline+9),(ps+31)+','+(baseline-50),
        (ps+38)+','+baseline,(ps+pulseW)+','+baseline
      ].join(' ');
      document.getElementById('pulse-glow').setAttribute('points', pts);
      document.getElementById('pulse-crisp').setAttribute('points', pts);
      document.getElementById('peak-dot').setAttribute('cx', ps + 14);
      document.getElementById('div-left').setAttribute('x2', ps);
      document.getElementById('div-right').setAttribute('x1', ps + pulseW);
      setTimeout(function() {
        try {
          var subBB = document.getElementById('t-sub').getBBox();
          if (!subBB || subBB.width < 50) return;
          var subEnd = subBB.x + subBB.width;
          document.getElementById('div-right').setAttribute('x2', subEnd);
          var totalW = Math.ceil(subEnd) + 2;
          var svg = document.getElementById('logo');
          svg.setAttribute('viewBox', '0 0 ' + totalW + ' 178');
          svg.setAttribute('width', totalW);
        } catch(e) {}
      }, 200);
    } catch(e) {}
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() { setTimeout(refineLayout, 50); });
  }
  window.addEventListener('load', function() { setTimeout(refineLayout, 300); });
</script>
</body>
</html>
